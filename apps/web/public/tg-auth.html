<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiBot — Авторизация</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #1E293B);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #ff8533, #ffaa66);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      color: white;
      font-weight: bold;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #64748B);
      margin-bottom: 32px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--tg-theme-hint-color, #E2E8F0);
      border-top-color: var(--tg-theme-button-color, #F97316);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #64748B);
    }
    .error {
      color: #EF4444;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .retry-btn {
      display: none;
      background: var(--tg-theme-button-color, #F97316);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .retry-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">A</div>
    <h1>AiBot</h1>
    <p class="subtitle">Образовательная платформа</p>
    <div id="loading">
      <div class="spinner"></div>
      <p class="status" id="status">Авторизация...</p>
    </div>
    <p class="error" id="error"></p>
    <button class="retry-btn" id="retryBtn" onclick="authenticate()">Попробовать снова</button>
  </div>

  <script>
    const API_URL = window.location.origin;

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = msg;
      document.getElementById('retryBtn').style.display = 'inline-block';
    }

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function authenticate() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';

      try {
        const tg = window.Telegram && window.Telegram.WebApp;

        // DEBUG: show what the page sees
        const debug = {
          hasTelegram: !!window.Telegram,
          hasWebApp: !!(window.Telegram && window.Telegram.WebApp),
          initData: tg ? tg.initData : 'N/A',
          initDataLength: tg ? tg.initData.length : 0,
          platform: tg ? tg.platform : 'N/A',
          version: tg ? tg.version : 'N/A',
          colorScheme: tg ? tg.colorScheme : 'N/A',
        };

        document.getElementById('error').style.display = 'block';
        document.getElementById('error').style.color = '#666';
        document.getElementById('error').textContent = 'DEBUG: ' + JSON.stringify(debug);

        if (!tg) {
          showError('Telegram WebApp SDK не загружен. DEBUG: ' + JSON.stringify(debug));
          return;
        }

        tg.ready();
        tg.expand();

        const initData = tg.initData;
        if (!initData) {
          showError('initData пуст. platform=' + tg.platform + ' version=' + tg.version + ' initDataUnsafe=' + JSON.stringify(tg.initDataUnsafe));
          return;
        }

        showStatus('Проверка данных...');

        // Send initData to backend for HMAC validation + JWT generation
        const response = await fetch(API_URL + '/api/auth/telegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData }),
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          showError(data.error?.message || 'Ошибка авторизации');
          return;
        }

        showStatus('Вход выполнен!');

        // Save auth data in the same format as the login page (Zustand persist)
        // Key: 'lms-auth', format: { state: { user, token, refreshToken }, version: 0 }
        const authData = {
          state: {
            user: data.data.user,
            token: data.data.accessToken,
            refreshToken: data.data.refreshToken,
          },
          version: 0,
        };

        localStorage.setItem('lms-auth', JSON.stringify(authData));

        // Redirect to dashboard
        window.location.replace('/dashboard');

      } catch (err) {
        showError('Ошибка соединения. Проверьте интернет.');
      }
    }

    // Auto-authenticate on load
    authenticate();
  </script>
</body>
</html>
