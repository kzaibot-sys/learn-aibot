<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8533;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffaa66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9944;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="540" cy="540" r="480" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="200" cy="200" r="80" fill="#ffffff" opacity="0.1"/>
  <circle cx="880" cy="880" r="100" fill="#ffffff" opacity="0.08"/>
  <circle cx="850" cy="250" r="60" fill="#ffffff" opacity="0.12"/>
  
  <!-- Main Icon Container -->
  <g filter="url(#shadow)">
    <!-- Graduation Cap Base -->
    <path d="M 540 420 L 780 480 L 540 540 L 300 480 Z" fill="url(#iconGradient)" stroke="#ffffff" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Cap Top -->
    <path d="M 540 420 L 780 480 L 760 500 L 540 440 L 320 500 L 300 480 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Tassel -->
    <circle cx="540" cy="400" r="15" fill="#ffffff"/>
    <rect x="535" y="400" width="10" height="60" fill="#ffffff" opacity="0.9"/>
    <circle cx="540" cy="460" r="20" fill="#ffffff" opacity="0.8"/>
    
    <!-- Mortarboard Side -->
    <rect x="730" y="500" width="50" height="180" rx="10" fill="url(#iconGradient)" opacity="0.9"/>
    <rect x="740" y="680" width="30" height="8" rx="4" fill="#ffffff"/>
  </g>
  
  <!-- Text -->
  <text x="540" y="750" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#ffffff" text-anchor="middle">
    LearnHub
  </text>
  <text x="540" y="820" font-family="Arial, sans-serif" font-size="48" font-weight="normal" fill="#ffffff" text-anchor="middle" opacity="0.9">
    PRO
  </text>
  
  <!-- Sparkle Effects -->
  <circle cx="400" cy="350" r="6" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="380" r="8" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="520" r="5" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
