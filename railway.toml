# Railway configuration for the API service (default)
# For multi-service setup, create separate services in Railway dashboard:
#   - API service: uses Dockerfile (root directory: /)
#   - Web service: uses Dockerfile.web (root directory: /)
#
# Each service should have its own environment variables configured in Railway.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
